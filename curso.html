<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Curso | Exprésate</title>
  <link rel="stylesheet" href="layout.css" />
  <link rel="stylesheet" href="theme-light.css" />
  <link rel="stylesheet" href="gamify.css" />
</head>
<body data-page="curso">

  <div class="topbar"></div>

  <div class="shell course-shell">
    <main class="content course-dashboard">
      <nav class="course-quick-nav" aria-label="Navegación rápida">
        <a href="index.html">Inicio</a>
        <a class="active" href="curso.html" aria-current="page">Curso</a>
        <a href="diccionario.html">Diccionario</a>
        <a href="juego-comida.html">Juego</a>
        <a href="pricing.html">Premium</a>
      </nav>

      <header class="course-hero">
        <div>
          <p class="course-eyebrow">Ruta de aprendizaje</p>
          <h1>Curso</h1>
          <p class="sub">Teoría → práctica → quiz → desbloquea el siguiente paso.</p>
        </div>
      </header>

      <section class="course-progress-dock" aria-label="Tu progreso">
        <div id="progressPanel">
          <p class="small skeleton-pulse" style="height:1.2em; width:70%; border-radius:6px;">Cargando progreso…</p>
        </div>
      </section>

      <section class="course-route-card" aria-labelledby="courseRouteTitle">
        <div class="course-route-head">
          <div>
            <p class="course-eyebrow">Módulos</p>
            <h2 id="courseRouteTitle">Tu ruta paso a paso</h2>
          </div>
          <p class="small">Los candados Premium y los bloqueos por quiz se actualizan automáticamente.</p>
        </div>

        <!-- Modules + steps are rendered from data/lessons.js by curso.js.
             To add a new lesson or quiz, edit data/lessons.js — no HTML
             change needed here. -->
        <div id="modulesContainer">
          <p class="small skeleton-pulse" style="height:1.2em; width:60%; border-radius:6px;">Cargando curso…</p>
        </div>
      </section>

      <p class="course-footer small">© <span id="year"></span> Exprésate</p>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabaseClient.js"></script>
  <script src="access.js"></script>
  <script src="progress.js"></script>
  <script src="sync.js"></script>
  <script src="alerts.js"></script>
  <script src="nav.js"></script>
  <script src="data/lessons.js"></script>
  <script src="data/quizzes.js"></script>
  <script src="curso.js"></script>
  <script src="app.js"></script>
</body>
</html>
